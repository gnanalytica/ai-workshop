<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Community Board · AI Workshop</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&family=Instrument+Serif&display=swap" rel="stylesheet">
<!-- Apply theme before paint to prevent flash -->
<script>document.documentElement.dataset.theme=localStorage.getItem('theme')||'dark';</script>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
<link rel="stylesheet" href="assets/app.css" />
<style>
  /* ── page-level layout ─────────────────────────────────────────────── */
  .page-hero {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 14px;
    margin: 32px 0 24px;
  }
  .page-hero h1 {
    font-size: clamp(26px, 4vw, 38px);
    margin: 4px 0 0;
    letter-spacing: -.025em;
  }
  .page-hero .sub {
    font-size: 13.5px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ── gate / denied (match admin-home pattern) ──────────────────────── */
  .gate-msg {
    min-height: 60vh;
    display: grid;
    place-items: center;
    padding: 40px 20px;
  }
  .gate-msg-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 40px;
    max-width: 440px;
    width: 100%;
    text-align: center;
  }
  .gate-msg-card h2 { margin: 0 0 12px; }
  .gate-msg-card .sub { font-size: 14px; color: var(--muted); margin: 0 0 20px; }

  /* ── sign-in inline form ───────────────────────────────────────────── */
  #signInForm .field { margin-bottom: 12px; }
  #signInForm input[type="email"] {
    background: var(--input-bg);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--ink);
    font-family: inherit;
    font-size: 14px;
    width: 100%;
    outline: none;
  }
  #signInForm input[type="email"]:focus { border-color: var(--accent); }
</style>
</head>
<body>
<!-- ── nav ──────────────────────────────────────────────────────────────── -->
<nav>
  <div class="wrap nav-in">
    <div class="brand">
      <span class="dot"></span>
      <span>Gnanalytica · AI Workshop</span>
    </div>
    <div style="display:flex;gap:12px;align-items:center">
      <a href="dashboard.html" class="muted" style="font-size:13px">← Dashboard</a>
      <button class="theme-toggle" id="themeToggle" title="Toggle light/dark" aria-label="Toggle theme"></button>
      <button id="signoutBtn" style="display:none;padding:8px 14px;border-radius:999px;background:transparent;border:1px solid var(--line);color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit">Sign out</button>
    </div>
  </div>
</nav>

<!-- ── unauthenticated gate ─────────────────────────────────────────────── -->
<div id="gateView" class="gate-msg" style="display:none">
  <div class="gate-msg-card">
    <div class="kicker">Community</div>
    <h2>Sign in to join the board</h2>
    <p class="sub">All enrolled students and staff can read, post, and upvote questions.</p>
    <form id="signInForm">
      <div class="field">
        <input type="email" name="email" placeholder="Your email address" required autocomplete="email" />
      </div>
      <button type="submit" class="submit-btn" id="signInBtn">Send magic link →</button>
      <div class="msg" id="signInMsg"></div>
    </form>
  </div>
</div>

<!-- ── main content (authenticated) ─────────────────────────────────────── -->
<main class="wrap" id="mainView" style="display:none">
  <div class="page-hero">
    <div>
      <div class="kicker">Community</div>
      <h1>Q&amp;A Board</h1>
      <div class="sub">Ask questions, share knowledge, upvote the best answers.</div>
    </div>
    <div id="userMeta" style="font-size:13px;color:var(--muted);text-align:right"></div>
  </div>

  <!-- board.js mounts here -->
  <div id="boardContainer"></div>

  <div style="height:100px"></div><!-- spacer for floating button -->
</main>

<script type="module">
  import { supabase } from './assets/supabase.js';
  import { resolveRoles } from './assets/admin-auth.js';
  import { wireThemeToggle } from './assets/theme.js';
  import { mountBoard } from './assets/board.js';

  wireThemeToggle();

  const $ = id => document.getElementById(id);

  function show(view) {
    ['gateView', 'mainView'].forEach(id => {
      const el = $(id);
      if (el) el.style.display = (id === view) ? (view === 'mainView' ? 'block' : 'grid') : 'none';
    });
    $('signoutBtn').style.display = (view === 'mainView') ? 'inline-block' : 'none';
  }

  async function onAuth(user) {
    // Resolve roles — null cohort = platform-wide
    const roles = await resolveRoles(user, null);
    const canModerate = roles.can.moderateBoard;

    // Show user identity in header
    const meta = $('userMeta');
    if (meta) {
      const roleBadge = canModerate
        ? `<span style="margin-left:6px;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;background:rgba(195,255,54,.1);color:#c9f76a;border:1px solid rgba(195,255,54,.28)">Staff</span>`
        : '';
      meta.innerHTML = `${esc(user.email)}${roleBadge}`;
    }

    show('mainView');

    await mountBoard($('boardContainer'), {
      user,
      canModerate,
      supabase,
    });
  }

  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  }

  // ── sign-in form ──────────────────────────────────────────────────────────
  $('signInForm')?.addEventListener('submit', async e => {
    e.preventDefault();
    const btn = $('signInBtn');
    const msg = $('signInMsg');
    btn.disabled = true;
    btn.textContent = 'Sending…';
    const email = new FormData(e.target).get('email');
    const redirectTo = window.location.href;
    const { error } = await supabase.auth.signInWithOtp({ email, options: { emailRedirectTo: redirectTo } });
    msg.className = 'msg show ' + (error ? 'err' : 'ok');
    msg.textContent = error ? error.message : 'Check your email for the magic link.';
    btn.textContent = error ? 'Send magic link →' : 'Link sent ✓';
    if (!error) btn.disabled = false;
  });

  // ── sign-out ──────────────────────────────────────────────────────────────
  $('signoutBtn')?.addEventListener('click', async () => {
    await supabase.auth.signOut();
    location.reload();
  });

  // ── auth state ────────────────────────────────────────────────────────────
  supabase.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) onAuth(session.user);
    if (event === 'SIGNED_OUT') show('gateView');
  });

  async function init() {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
      show('gateView');
      return;
    }
    await onAuth(session.user);
  }

  init();
</script>
</body>
</html>
