<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Capstone tracker · Admin · AI Workshop</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script>document.documentElement.dataset.theme=localStorage.getItem('theme')||'dark';</script>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
<link rel="stylesheet" href="assets/app.css" />
<style>
  .denied{padding:40px;text-align:center;color:var(--muted)}
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--accent);color:var(--accent);padding:10px 18px;border-radius:999px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
  .toast.err{border-color:#ff6b6b;color:#ffa0a0}
  .empty-state{padding:40px;text-align:center;color:var(--muted);font-size:13.5px}

  .ms-toolbar{display:flex;flex-wrap:wrap;align-items:end;gap:14px;margin:18px 0 14px}
  .ms-toolbar .grp{display:flex;flex-direction:column;gap:6px}
  .ms-toolbar label{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
  .ms-toolbar select,.ms-toolbar input[type="search"]{background:var(--input-bg);border:1px solid var(--line);border-radius:10px;padding:9px 12px;color:var(--ink);font-family:inherit;font-size:13.5px;outline:none;min-width:220px}

  .pill-tabs{display:inline-flex;background:var(--input-bg);border:1px solid var(--line);border-radius:999px;padding:4px;gap:4px}
  .pill-tabs button{background:transparent;border:none;color:var(--muted);font:inherit;font-size:12.5px;padding:6px 14px;border-radius:999px;cursor:pointer;letter-spacing:.04em}
  .pill-tabs button.active{background:var(--accent);color:#0c1010;font-weight:600}

  .stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin:0 0 18px}
  .stat-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px}
  .stat-card .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
  .stat-card .val{font-size:22px;font-weight:700;color:var(--ink);font-family:'JetBrains Mono',monospace}
  .stat-card .sub{font-size:11.5px;color:var(--muted);margin-top:3px}

  .matrix-wrap{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:auto}
  .ms-table{width:100%;border-collapse:collapse;min-width:840px}
  .ms-table th,.ms-table td{padding:12px 14px;border-bottom:1px solid var(--line);text-align:left;font-size:13px;vertical-align:top}
  .ms-table th{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:500;background:var(--input-bg);position:sticky;top:0;z-index:1}
  .ms-table th.ms-col,.ms-table td.ms-col{text-align:center;min-width:120px;max-width:140px}
  .ms-table td.row-head{font-weight:600;min-width:200px}
  .ms-table td.row-head .sub{font-size:11.5px;color:var(--muted);font-weight:400;margin-top:2px}

  .cell{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;border-radius:8px;cursor:pointer;transition:background .15s}
  .cell:hover{background:rgba(195,255,54,.06)}
  .cell .dot{font-size:14px;line-height:1}
  .cell .score{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--ink);font-weight:600}
  .cell .when{font-size:10.5px;color:var(--muted)}
  .cell.empty{cursor:default;color:var(--muted);font-size:12px}
  .cell.empty:hover{background:transparent}

  .status-graded{color:#7fc97f}
  .status-submitted{color:#ffb977}
  .status-draft{color:#7aa7ff}
  .status-missing{color:var(--muted)}

  /* Drawer */
  .drawer-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .18s;z-index:300}
  .drawer-backdrop.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;bottom:0;width:min(520px,92vw);background:var(--card);border-left:1px solid var(--line);transform:translateX(100%);transition:transform .22s ease;z-index:301;overflow-y:auto;padding:22px 24px}
  .drawer.show{transform:translateX(0)}
  .drawer h3{margin:0 0 4px;font-size:18px}
  .drawer .close{position:absolute;top:12px;right:14px;background:transparent;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1}
  .drawer .meta{font-size:12.5px;color:var(--muted);margin-bottom:14px}
  .drawer .field-block{margin:14px 0;padding:12px 14px;background:var(--input-bg);border:1px solid var(--line);border-radius:10px}
  .drawer .field-block .lbl{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
  .drawer .field-block pre{margin:0;font-family:'JetBrains Mono',monospace;font-size:12.5px;white-space:pre-wrap;word-break:break-word;color:var(--ink)}
  .drawer .rubric-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--line);font-size:13px}
  .drawer .rubric-row:last-child{border-bottom:none}
  .drawer a.link{color:var(--accent);word-break:break-all}

  @media(max-width:900px){
    .stats-row{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>
<body>
<a href="#panel" class="skip-link">Skip to main content</a>

<nav>
  <div class="wrap nav-in">
    <div class="brand"><span class="dot"></span> Gnanalytica · Admin</div>
    <div style="display:flex;gap:12px;align-items:center">
      <a href="index.html" class="muted" style="font-size:13px">← Home</a>
      <button class="theme-toggle" id="themeToggle" title="Toggle light/dark" aria-label="Toggle theme"></button>
      <button class="signout" id="signoutBtn" style="display:none;padding:8px 14px;border-radius:999px;background:transparent;border:1px solid var(--line);color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit">Sign out</button>
    </div>
  </div>
</nav>

<!-- GATE -->
<div class="gate" id="gate" style="display:none">
  <div class="gate-card">
    <div class="kicker">Sign in</div>
    <h2>Sign in</h2>
    <form id="loginForm">
      <div class="field"><label>Email</label><input type="email" name="email" required /></div>
      <button type="submit" class="submit-btn" id="loginBtn">Send magic link →</button>
      <div class="msg" id="loginMsg"></div>
    </form>
  </div>
</div>

<!-- DENIED -->
<div class="gate" id="denied" style="display:none">
  <div class="gate-card">
    <div class="denied">
      <h2 style="text-align:center">Staff only</h2>
      <p>Capstone tracker is restricted to faculty and admins. <a href="dashboard.html">Back to dashboard</a>.</p>
      <button class="submit-btn" style="margin-top:12px" id="signOutAlt">Sign out</button>
    </div>
  </div>
</div>

<!-- PANEL -->
<main class="wrap" id="panel" style="display:none">
  <div id="adminNav"></div>

  <div style="margin:24px 0 8px">
    <div class="kicker">Work</div>
    <h1>Capstone tracker</h1>
    <p class="muted" style="font-size:14px;margin:6px 0 0">Track M1–M5 milestone submissions across teams or individuals. Click any cell for submission detail.</p>
  </div>

  <div class="ms-toolbar">
    <div class="grp">
      <label for="ms_cohort">Cohort</label>
      <select id="ms_cohort"></select>
    </div>
    <div class="grp">
      <label>View</label>
      <div class="pill-tabs" role="tablist" aria-label="View mode">
        <button type="button" data-view="team" class="active" role="tab">By team</button>
        <button type="button" data-view="student" role="tab">By student</button>
      </div>
    </div>
    <div class="grp">
      <label for="ms_status">Status</label>
      <select id="ms_status">
        <option value="all">All</option>
        <option value="graded">Graded</option>
        <option value="pending">Pending (submitted/draft)</option>
        <option value="missing">Missing</option>
      </select>
    </div>
    <div class="grp" style="flex:1;min-width:220px">
      <label for="ms_search">Search</label>
      <input id="ms_search" type="search" placeholder="Filter by name, email, team…" />
    </div>
  </div>

  <div class="stats-row" id="stats"></div>

  <div class="matrix-wrap">
    <table class="ms-table">
      <thead id="ms_thead"></thead>
      <tbody id="ms_tbody"><tr><td colspan="6" class="empty-state">Loading…</td></tr></tbody>
    </table>
  </div>
</main>

<div class="drawer-backdrop" id="drawerBackdrop"></div>
<aside class="drawer" id="drawer" aria-hidden="true">
  <button type="button" class="close" id="drawerClose" aria-label="Close">×</button>
  <div id="drawerBody"></div>
</aside>

<div class="toast" id="toast"></div>

<script type="module">
  import { supabase } from './assets/supabase.js';
  import { renderAdminNav, wrapAdminMainLayout } from './assets/admin-nav.js';
  import { checkAdminOrFaculty } from './assets/admin-auth.js';
  import { wireThemeToggle } from './assets/theme.js';
  wireThemeToggle();

  const $ = (id) => document.getElementById(id);
  const MILESTONE_DAYS = [6, 11, 16, 21, 26];
  const MILESTONE_LABELS = ['M1', 'M2', 'M3', 'M4', 'M5'];

  let COHORTS = [];
  let CURRENT_COHORT = null;
  let ASSIGNMENTS = [];          // milestone assignments [{id,day_number,title,points,rubric_items}]
  let ASSIGN_BY_DAY = new Map(); // day_number -> assignment
  let SUBMISSIONS = [];          // raw submission rows
  let SUB_BY_USER_ASSIGN = new Map(); // `${user_id}::${assignment_id}` -> submission
  let TEAMS = [];
  let TEAM_MEMBERS = [];
  let MEMBERS_BY_TEAM = new Map();
  let TEAM_BY_USER = new Map();
  let PROFILES = new Map();
  let ENROLLED_USER_IDS = [];

  let VIEW_MODE = 'team';        // 'team' | 'student'
  let STATUS_FILTER = 'all';
  let SEARCH_TERM = '';

  function show(id) {
    ['gate', 'denied', 'panel'].forEach(x => $(x).style.display = x === id ? (id === 'panel' ? 'block' : 'grid') : 'none');
    $('signoutBtn').style.display = id === 'gate' ? 'none' : 'inline-block';
  }
  function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
  function toast(msg, kind = 'ok') { const t = $('toast'); t.textContent = msg; t.className = 'toast show' + (kind === 'err' ? ' err' : ''); setTimeout(() => { t.className = 'toast'; }, 2400); }

  function relTime(iso) {
    if (!iso) return '';
    const t = new Date(iso).getTime();
    const diff = Date.now() - t;
    const m = Math.floor(diff / 60000);
    if (m < 1) return 'just now';
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}h ago`;
    const d = Math.floor(h / 24);
    if (d < 30) return `${d}d ago`;
    return new Date(iso).toLocaleDateString();
  }

  function statusOf(sub) {
    if (!sub) return 'missing';
    if (sub.status === 'graded') return 'graded';
    if (sub.status === 'submitted') return 'submitted';
    if (sub.status === 'draft') return 'draft';
    return 'missing';
  }

  function statusDot(s) {
    if (s === 'graded') return '<span class="dot status-graded">●</span>';
    if (s === 'submitted') return '<span class="dot status-submitted">●</span>';
    if (s === 'draft') return '<span class="dot status-draft">○</span>';
    return '<span class="dot status-missing">○</span>';
  }

  // --- Hash persistence: #view=team|student ---
  function readHash() {
    const h = (location.hash || '').replace(/^#/, '');
    const params = new URLSearchParams(h);
    const v = params.get('view');
    if (v === 'student' || v === 'team') VIEW_MODE = v;
  }
  function writeHash() {
    const params = new URLSearchParams();
    params.set('view', VIEW_MODE);
    history.replaceState(null, '', '#' + params.toString());
  }

  $('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = $('loginBtn'); const msg = $('loginMsg');
    btn.disabled = true; btn.textContent = 'Sending…'; msg.className = 'msg';
    const email = new FormData(e.target).get('email');
    const { error } = await supabase.auth.signInWithOtp({ email, options: { emailRedirectTo: window.location.href } });
    if (error) { msg.className = 'msg show err'; msg.textContent = error.message; btn.disabled = false; btn.textContent = 'Send magic link →'; }
    else { msg.className = 'msg show ok'; msg.textContent = 'Check your email.'; btn.textContent = 'Sent ✓'; }
  });
  [$('signoutBtn'), $('signOutAlt')].forEach(b => b.addEventListener('click', async () => { await supabase.auth.signOut(); location.reload(); }));
  supabase.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) gate(session.user);
    if (event === 'SIGNED_OUT') show('gate');
  });

  async function init() {
    readHash();
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) return show('gate');
    await gate(session.user);
  }

  async function gate(user) {
    const { isAdmin, isFaculty, facultyCohortIds } = await checkAdminOrFaculty(user);
    if (!isAdmin && !isFaculty) return show('denied');
    show('panel');
    $('adminNav').innerHTML = renderAdminNav('admin-milestones.html', { role: isAdmin ? 'admin' : 'faculty' });
    wrapAdminMainLayout();
    await loadCohorts(isAdmin, facultyCohortIds);
    wireToolbar();
    if (CURRENT_COHORT) await loadCohortData(CURRENT_COHORT);
  }

  async function loadCohorts(isAdmin, facultyCohortIds) {
    let q = supabase.from('cohorts').select('id,name,slug').order('starts_on', { ascending: false });
    if (!isAdmin && Array.isArray(facultyCohortIds) && facultyCohortIds.length) {
      q = q.in('id', facultyCohortIds);
    }
    const { data, error } = await q;
    if (error) { toast(error.message, 'err'); return; }
    COHORTS = data || [];
    const sel = $('ms_cohort');
    if (!COHORTS.length) {
      sel.innerHTML = `<option>No cohorts</option>`;
      $('ms_tbody').innerHTML = `<tr><td colspan="6" class="empty-state">No cohorts available.</td></tr>`;
      return;
    }
    sel.innerHTML = COHORTS.map(c => `<option value="${esc(c.id)}">${esc(c.name)} · ${esc(c.slug)}</option>`).join('');
    CURRENT_COHORT = COHORTS[0].id;
  }

  function wireToolbar() {
    $('ms_cohort').addEventListener('change', async (e) => {
      CURRENT_COHORT = e.target.value;
      await loadCohortData(CURRENT_COHORT);
    });
    document.querySelectorAll('.pill-tabs button[data-view]').forEach(b => {
      b.addEventListener('click', () => {
        VIEW_MODE = b.dataset.view;
        document.querySelectorAll('.pill-tabs button[data-view]').forEach(x => x.classList.toggle('active', x === b));
        writeHash();
        render();
      });
      if (b.dataset.view === VIEW_MODE) b.classList.add('active'); else b.classList.remove('active');
    });
    $('ms_status').addEventListener('change', (e) => { STATUS_FILTER = e.target.value; render(); });
    $('ms_search').addEventListener('input', (e) => { SEARCH_TERM = e.target.value.trim().toLowerCase(); render(); });

    $('drawerBackdrop').addEventListener('click', closeDrawer);
    $('drawerClose').addEventListener('click', closeDrawer);
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDrawer(); });
  }

  async function loadCohortData(cohortId) {
    $('ms_tbody').innerHTML = `<tr><td colspan="6" class="empty-state">Loading…</td></tr>`;

    // 1) milestone assignments for this cohort
    const { data: aRows, error: aErr } = await supabase
      .from('assignments')
      .select('id,day_number,title,points,rubric_items')
      .eq('cohort_id', cohortId)
      .in('day_number', MILESTONE_DAYS);
    if (aErr) { $('ms_tbody').innerHTML = `<tr><td colspan="6" class="empty-state">Error: ${esc(aErr.message)}</td></tr>`; return; }
    ASSIGNMENTS = (aRows || []).sort((a, b) => a.day_number - b.day_number);
    ASSIGN_BY_DAY = new Map(ASSIGNMENTS.map(a => [a.day_number, a]));

    const assignmentIds = ASSIGNMENTS.map(a => a.id);

    // 2) confirmed registrations (enrolled students) + 3) teams + 4) members in parallel
    const [regRes, teamRes, subRes] = await Promise.all([
      supabase.from('registrations').select('user_id').eq('cohort_id', cohortId).eq('status', 'confirmed'),
      supabase.from('teams').select('id,name,description,cohort_id').eq('cohort_id', cohortId),
      assignmentIds.length
        ? supabase.from('submissions').select('id,user_id,assignment_id,status,score,submitted_at,updated_at,content_url,content_text,rubric_scores').in('assignment_id', assignmentIds)
        : Promise.resolve({ data: [], error: null }),
    ]);
    if (regRes.error) { $('ms_tbody').innerHTML = `<tr><td colspan="6" class="empty-state">Error: ${esc(regRes.error.message)}</td></tr>`; return; }
    if (teamRes.error) { toast(teamRes.error.message, 'err'); }
    if (subRes.error) { toast(subRes.error.message, 'err'); }

    ENROLLED_USER_IDS = (regRes.data || []).map(r => r.user_id);
    TEAMS = (teamRes.data || []).sort((a, b) => (a.name || '').localeCompare(b.name || ''));
    SUBMISSIONS = subRes.data || [];
    SUB_BY_USER_ASSIGN = new Map();
    SUBMISSIONS.forEach(s => SUB_BY_USER_ASSIGN.set(`${s.user_id}::${s.assignment_id}`, s));

    // team_members
    let tmRows = [];
    if (TEAMS.length) {
      const { data: tm, error: tmErr } = await supabase
        .from('team_members').select('team_id,user_id,role').in('team_id', TEAMS.map(t => t.id));
      if (tmErr) toast(tmErr.message, 'err');
      tmRows = tm || [];
    }
    TEAM_MEMBERS = tmRows;
    MEMBERS_BY_TEAM = new Map();
    TEAM_BY_USER = new Map();
    TEAMS.forEach(t => MEMBERS_BY_TEAM.set(t.id, []));
    tmRows.forEach(m => {
      MEMBERS_BY_TEAM.get(m.team_id)?.push(m);
      TEAM_BY_USER.set(m.user_id, m.team_id);
    });

    // profiles for enrolled + team members
    const allUserIds = [...new Set([...ENROLLED_USER_IDS, ...tmRows.map(m => m.user_id), ...SUBMISSIONS.map(s => s.user_id)])];
    if (allUserIds.length) {
      const { data: profs, error: pErr } = await supabase.from('profiles').select('id,full_name,email').in('id', allUserIds);
      if (pErr) toast(pErr.message, 'err');
      PROFILES = new Map((profs || []).map(p => [p.id, p]));
    } else {
      PROFILES = new Map();
    }

    render();
  }

  function profileLabel(userId) {
    const p = PROFILES.get(userId);
    if (!p) return userId.slice(0, 8);
    return p.full_name || p.email || userId.slice(0, 8);
  }

  // ---- Aggregations ----
  function teamRowCells(memberIds) {
    // For a team row: cell per milestone is aggregate of members' submissions.
    // Status precedence (worst-first): missing > draft > submitted > graded.
    return ASSIGNMENTS.map(a => {
      const subs = memberIds.map(uid => SUB_BY_USER_ASSIGN.get(`${uid}::${a.id}`)).filter(Boolean);
      const total = memberIds.length || 1;
      const counts = { graded: 0, submitted: 0, draft: 0, missing: 0 };
      memberIds.forEach(uid => {
        counts[statusOf(SUB_BY_USER_ASSIGN.get(`${uid}::${a.id}`))]++;
      });
      const allGraded = counts.graded === total && total > 0;
      const anyMissing = counts.missing > 0;
      let aggStatus = 'missing';
      if (allGraded) aggStatus = 'graded';
      else if (counts.submitted + counts.graded === total && total > 0) aggStatus = 'submitted';
      else if (counts.draft + counts.submitted + counts.graded === total && total > 0) aggStatus = 'draft';
      else aggStatus = anyMissing ? 'missing' : 'draft';

      // average score (graded only)
      const graded = subs.filter(s => s && s.status === 'graded' && typeof s.score === 'number');
      const avg = graded.length ? (graded.reduce((acc, s) => acc + s.score, 0) / graded.length) : null;
      const latest = subs.map(s => s?.submitted_at).filter(Boolean).sort().pop();

      return { assignment: a, status: aggStatus, score: avg, when: latest, counts, total };
    });
  }

  function studentRowCells(userId) {
    return ASSIGNMENTS.map(a => {
      const sub = SUB_BY_USER_ASSIGN.get(`${userId}::${a.id}`) || null;
      return {
        assignment: a,
        status: statusOf(sub),
        score: sub?.score ?? null,
        when: sub?.submitted_at || sub?.updated_at || null,
        sub,
      };
    });
  }

  function passesStatusFilter(cells) {
    if (STATUS_FILTER === 'all') return true;
    if (STATUS_FILTER === 'graded') return cells.some(c => c.status === 'graded');
    if (STATUS_FILTER === 'pending') return cells.some(c => c.status === 'submitted' || c.status === 'draft');
    if (STATUS_FILTER === 'missing') return cells.some(c => c.status === 'missing');
    return true;
  }

  function passesSearch(hay) {
    if (!SEARCH_TERM) return true;
    return hay.toLowerCase().includes(SEARCH_TERM);
  }

  // ---- Stats ----
  function renderStats(rows) {
    const stats = $('stats');
    if (!ASSIGNMENTS.length) { stats.innerHTML = ''; return; }
    const totalRows = rows.length || 1;
    const blocks = ASSIGNMENTS.map((a, i) => {
      let completed = 0, scoresSum = 0, scoresN = 0, overdue = 0;
      const dueDate = a.due_at ? new Date(a.due_at) : null;
      rows.forEach(r => {
        const cell = r.cells[i];
        if (cell.status === 'graded' || cell.status === 'submitted') completed++;
        if (cell.status === 'graded' && typeof cell.score === 'number') { scoresSum += cell.score; scoresN++; }
        if (cell.status === 'missing' && dueDate && dueDate < new Date()) overdue++;
      });
      const pct = Math.round((completed / totalRows) * 100);
      const avg = scoresN ? (scoresSum / scoresN).toFixed(1) : '—';
      return `<div class="stat-card">
        <div class="lbl">${MILESTONE_LABELS[i]} · Day ${a.day_number}</div>
        <div class="val">${pct}%</div>
        <div class="sub">avg ${avg}/${a.points || 25}${overdue ? ` · ${overdue} overdue` : ''}</div>
      </div>`;
    }).join('');
    stats.innerHTML = blocks;
  }

  // ---- Table render ----
  function renderHead() {
    const cols = ASSIGNMENTS.map((a, i) => `<th class="ms-col">${MILESTONE_LABELS[i]}<div class="muted" style="font-weight:400;font-size:10.5px;margin-top:3px">Day ${a.day_number}</div></th>`).join('');
    const rowHead = VIEW_MODE === 'team' ? 'Team' : 'Student';
    $('ms_thead').innerHTML = `<tr><th>${rowHead}</th>${cols}</tr>`;
  }

  function renderCell(cell, ctx) {
    const dot = statusDot(cell.status);
    if (cell.status === 'missing') {
      return `<td class="ms-col"><div class="cell" data-action="open" data-ctx='${esc(JSON.stringify(ctx))}'>${dot}<span class="when status-missing">not started</span></div></td>`;
    }
    const points = cell.assignment.points || 25;
    const scoreTxt = (cell.status === 'graded' && cell.score != null)
      ? `${typeof cell.score === 'number' ? cell.score.toFixed(cell.score % 1 ? 1 : 0) : cell.score}/${points}`
      : (cell.status === 'submitted' ? 'submitted' : 'draft');
    return `<td class="ms-col"><div class="cell" data-action="open" data-ctx='${esc(JSON.stringify(ctx))}'>${dot}<span class="score">${esc(scoreTxt)}</span><span class="when">${esc(relTime(cell.when))}</span></div></td>`;
  }

  function render() {
    renderHead();

    if (!ASSIGNMENTS.length) {
      $('ms_tbody').innerHTML = `<tr><td class="empty-state">No milestone assignments configured for this cohort. Create assignments for days ${MILESTONE_DAYS.join(', ')}.</td></tr>`;
      $('stats').innerHTML = '';
      return;
    }

    const rows = [];
    if (VIEW_MODE === 'team') {
      TEAMS.forEach(t => {
        const memberIds = (MEMBERS_BY_TEAM.get(t.id) || []).map(m => m.user_id);
        const cells = teamRowCells(memberIds);
        const hay = `${t.name || ''} ${t.description || ''} ${memberIds.map(profileLabel).join(' ')}`;
        rows.push({ kind: 'team', team: t, memberIds, cells, hay });
      });
      // Add "Unassigned" pseudo-team for enrolled students with no team
      const unassigned = ENROLLED_USER_IDS.filter(uid => !TEAM_BY_USER.has(uid));
      if (unassigned.length) {
        const cells = teamRowCells(unassigned);
        rows.push({ kind: 'team', team: { id: '__unassigned__', name: 'Unassigned', description: `${unassigned.length} students without a team` }, memberIds: unassigned, cells, hay: 'unassigned ' + unassigned.map(profileLabel).join(' ') });
      }
    } else {
      const userIds = [...new Set([...ENROLLED_USER_IDS, ...SUBMISSIONS.map(s => s.user_id)])];
      userIds.sort((a, b) => profileLabel(a).localeCompare(profileLabel(b)));
      userIds.forEach(uid => {
        const cells = studentRowCells(uid);
        const p = PROFILES.get(uid) || {};
        const tId = TEAM_BY_USER.get(uid);
        const tName = tId ? (TEAMS.find(t => t.id === tId)?.name || '') : '';
        const hay = `${p.full_name || ''} ${p.email || ''} ${tName}`;
        rows.push({ kind: 'student', userId: uid, cells, hay, teamName: tName });
      });
    }

    const visible = rows.filter(r => passesStatusFilter(r.cells) && passesSearch(r.hay));
    renderStats(visible);

    if (!visible.length) {
      $('ms_tbody').innerHTML = `<tr><td colspan="${ASSIGNMENTS.length + 1}" class="empty-state">No ${VIEW_MODE === 'team' ? 'teams' : 'students'} match these filters.</td></tr>`;
      return;
    }

    $('ms_tbody').innerHTML = visible.map(r => {
      if (r.kind === 'team') {
        const memberNames = r.memberIds.slice(0, 3).map(profileLabel).join(', ') + (r.memberIds.length > 3 ? ` +${r.memberIds.length - 3}` : '');
        const head = `<td class="row-head"><div>${esc(r.team.name || 'Team')}</div><div class="sub">${esc(memberNames || 'no members')}</div></td>`;
        const cells = r.cells.map((c, i) => renderCell(c, { kind: 'team', teamId: r.team.id, dayIdx: i, memberIds: r.memberIds })).join('');
        return `<tr>${head}${cells}</tr>`;
      } else {
        const p = PROFILES.get(r.userId) || {};
        const head = `<td class="row-head"><div>${esc(p.full_name || profileLabel(r.userId))}</div><div class="sub">${esc(p.email || '')}${r.teamName ? ' · ' + esc(r.teamName) : ''}</div></td>`;
        const cells = r.cells.map((c, i) => renderCell(c, { kind: 'student', userId: r.userId, dayIdx: i })).join('');
        return `<tr>${head}${cells}</tr>`;
      }
    }).join('');

    $('ms_tbody').querySelectorAll('.cell[data-action="open"]').forEach(el => {
      el.addEventListener('click', () => {
        try { openDrawer(JSON.parse(el.dataset.ctx)); } catch (_) { /* noop */ }
      });
    });
  }

  // ---- Drawer ----
  function openDrawer(ctx) {
    const a = ASSIGNMENTS[ctx.dayIdx]; if (!a) return;
    let html = '';
    if (ctx.kind === 'student') {
      const sub = SUB_BY_USER_ASSIGN.get(`${ctx.userId}::${a.id}`) || null;
      html = renderStudentDrawer(ctx.userId, a, sub);
    } else {
      html = renderTeamDrawer(ctx.teamId, ctx.memberIds, a);
    }
    $('drawerBody').innerHTML = html;
    $('drawer').classList.add('show'); $('drawer').setAttribute('aria-hidden', 'false');
    $('drawerBackdrop').classList.add('show');
  }
  function closeDrawer() {
    $('drawer').classList.remove('show'); $('drawer').setAttribute('aria-hidden', 'true');
    $('drawerBackdrop').classList.remove('show');
  }

  function renderStudentDrawer(userId, assignment, sub) {
    const p = PROFILES.get(userId) || {};
    const name = p.full_name || profileLabel(userId);
    const milestoneIdx = MILESTONE_DAYS.indexOf(assignment.day_number);
    const mLabel = milestoneIdx >= 0 ? MILESTONE_LABELS[milestoneIdx] : `Day ${assignment.day_number}`;
    const points = assignment.points || 25;

    let body = `<div class="kicker">${esc(mLabel)} · Day ${assignment.day_number}</div>
      <h3>${esc(assignment.title || 'Milestone')}</h3>
      <div class="meta">${esc(name)}${p.email ? ' · ' + esc(p.email) : ''}</div>`;

    if (!sub) {
      body += `<div class="field-block"><div class="lbl">Status</div><div>Not started — no submission row.</div></div>`;
      return body;
    }

    body += `<div class="field-block">
      <div class="lbl">Status</div>
      <div>${statusDot(statusOf(sub))} <strong>${esc(sub.status || 'unknown')}</strong>
      ${sub.status === 'graded' && typeof sub.score === 'number' ? ` · <span class="score">${sub.score}/${points}</span>` : ''}</div>
      <div class="muted" style="font-size:12px;margin-top:6px">${sub.submitted_at ? 'Submitted ' + relTime(sub.submitted_at) : ''} ${sub.updated_at ? ' · updated ' + relTime(sub.updated_at) : ''}</div>
    </div>`;

    if (sub.content_url) {
      body += `<div class="field-block"><div class="lbl">Content URL</div><a class="link" href="${esc(sub.content_url)}" target="_blank" rel="noopener">${esc(sub.content_url)}</a></div>`;
    }
    if (sub.content_text) {
      body += `<div class="field-block"><div class="lbl">Content</div><pre>${esc(sub.content_text)}</pre></div>`;
    }

    const rubricItems = Array.isArray(assignment.rubric_items) ? assignment.rubric_items : [];
    const rubricScores = sub.rubric_scores && typeof sub.rubric_scores === 'object' ? sub.rubric_scores : {};
    if (rubricItems.length) {
      const rows = rubricItems.map((it, i) => {
        const key = it.key || it.id || `c${i + 1}`;
        const label = it.label || it.title || `Criterion ${i + 1}`;
        const max = it.max ?? it.points ?? '?';
        const val = rubricScores[key];
        return `<div class="rubric-row"><span>${esc(label)}</span><span class="score">${val == null ? '—' : esc(val)}/${esc(max)}</span></div>`;
      }).join('');
      body += `<div class="field-block"><div class="lbl">Rubric</div>${rows}</div>`;
    }

    return body;
  }

  function renderTeamDrawer(teamId, memberIds, assignment) {
    const team = TEAMS.find(t => t.id === teamId) || { name: teamId === '__unassigned__' ? 'Unassigned' : 'Team' };
    const milestoneIdx = MILESTONE_DAYS.indexOf(assignment.day_number);
    const mLabel = milestoneIdx >= 0 ? MILESTONE_LABELS[milestoneIdx] : `Day ${assignment.day_number}`;
    const points = assignment.points || 25;

    let body = `<div class="kicker">${esc(mLabel)} · Day ${assignment.day_number}</div>
      <h3>${esc(team.name || 'Team')}</h3>
      <div class="meta">${memberIds.length} member${memberIds.length === 1 ? '' : 's'}</div>`;

    const rows = memberIds.map(uid => {
      const sub = SUB_BY_USER_ASSIGN.get(`${uid}::${assignment.id}`) || null;
      const s = statusOf(sub);
      const scoreTxt = sub && sub.status === 'graded' && typeof sub.score === 'number'
        ? `${sub.score}/${points}`
        : (sub ? sub.status : '—');
      return `<div class="rubric-row">
        <span>${statusDot(s)} ${esc(profileLabel(uid))}</span>
        <span class="score">${esc(scoreTxt)}${sub?.submitted_at ? `<span class="muted" style="font-weight:400;font-size:11px"> · ${esc(relTime(sub.submitted_at))}</span>` : ''}</span>
      </div>`;
    }).join('');

    body += `<div class="field-block"><div class="lbl">Members</div>${rows || '<div class="muted">No members.</div>'}</div>`;
    body += `<div class="muted" style="font-size:12px;margin-top:8px">Click a student row in “By student” view to inspect their content & rubric.</div>`;

    return body;
  }

  init();
</script>
</body>
</html>
