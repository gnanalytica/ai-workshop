<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Student AI Showcase — Gnanalytica</title>
<meta name="description" content="Student AI Showcase — Gnanalytica" />
<link rel="canonical" href="https://gnanalytica.github.io/ai-workshop/showcase.html" />
<meta property="og:site_name" content="Gnanalytica AI Workshop" />
<meta property="og:type" content="website" />
<meta property="og:title" content="Student AI Showcase — Gnanalytica" />
<meta property="og:description" content="Student AI Showcase — Gnanalytica" />
<meta property="og:image" content="https://gnanalytica.github.io/ai-workshop/assets/og-default.svg" />
<meta property="og:url" content="https://gnanalytica.github.io/ai-workshop/showcase.html" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Student AI Showcase — Gnanalytica" />
<meta name="twitter:description" content="Student AI Showcase — Gnanalytica" />
<meta name="twitter:image" content="https://gnanalytica.github.io/ai-workshop/assets/og-default.svg" />
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&family=Instrument+Serif&display=swap" rel="stylesheet">
<script>document.documentElement.dataset.theme=localStorage.getItem('theme')||'dark';</script>
<link rel="stylesheet" href="assets/app.css" />
<style>
  .page{padding:48px 0 90px}
  .loading{text-align:center;color:var(--muted);padding:80px 20px}

  /* Masthead */
  .masthead{border-bottom:1px solid var(--line);padding:20px 0 36px;margin-bottom:34px}
  .mast-kicker{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.28em;color:var(--accent);text-transform:uppercase}
  .mast-name{font-family:"Instrument Serif",serif;font-style:italic;font-size:clamp(48px,7vw,96px);line-height:1.02;letter-spacing:-.02em;margin:10px 0 14px}
  .mast-meta{display:flex;flex-wrap:wrap;gap:14px 22px;color:var(--muted);font-size:14.5px}
  .mast-meta a{color:var(--ink);border-bottom:1px solid var(--line)}
  .mast-meta a:hover{border-color:var(--accent)}
  .subhead{color:var(--muted);font-size:16px;margin-top:8px}
  .verify-pill{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:999px;background:rgba(195,255,54,.1);border:1px solid rgba(195,255,54,.3);color:#c9f76a;font-size:12.5px;margin-top:16px}
  .verify-pill .tick{width:6px;height:6px;border-radius:50%;background:var(--accent)}

  /* Stats row */
  .stats-row{display:grid;grid-template-columns:auto 1fr;gap:28px;align-items:center;margin:36px 0 10px;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:26px 28px}
  .stat-big{font-family:"Instrument Serif",serif;font-style:italic;font-size:72px;line-height:1;color:var(--accent);letter-spacing:-.02em}
  .stat-big small{color:var(--muted);font-size:.35em;margin-left:2px;letter-spacing:.05em}
  .dotgrid{display:grid;grid-template-columns:repeat(15,1fr);gap:6px;max-width:520px}
  .dotgrid .d{aspect-ratio:1;border-radius:4px;background:#1a1a26;border:1px solid #22222e}
  .dotgrid .d.on{background:var(--accent);border-color:var(--accent);box-shadow:0 0 6px rgba(195,255,54,.4)}
  .stat-lbl{color:var(--muted);font-size:12px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:8px}

  /* Self banner */
  .self-banner{background:linear-gradient(145deg,rgba(139,92,246,.08),var(--card));border:1px solid rgba(139,92,246,.3);border-radius:18px;padding:18px 22px;display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:24px;flex-wrap:wrap}
  .self-banner h3{margin:0 0 4px;font-size:15px;letter-spacing:-.01em}
  .self-banner p{margin:0;color:var(--muted);font-size:13px}
  .toggle{position:relative;width:46px;height:26px;background:#1a1a26;border-radius:999px;cursor:pointer;border:1px solid var(--line);transition:all .2s;flex-shrink:0}
  .toggle.on{background:var(--accent);border-color:var(--accent)}
  .toggle::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:var(--input-bg);transition:all .2s}
  .toggle.on::after{left:22px;background:#0b0b10}
  .toggle-wrap{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted)}

  /* Section */
  .section-head{display:flex;justify-content:space-between;align-items:baseline;margin:44px 0 16px}
  .section-head h2{margin:0}
  .week-kicker{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin:28px 0 14px}

  /* Submissions masonry */
  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}
  .subcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px 22px;transition:all .15s;display:flex;flex-direction:column;gap:10px}
  .subcard:hover{transform:translateY(-2px);border-color:#3a3a4e}
  .subcard .day-n{font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--muted);letter-spacing:.15em}
  .subcard h4{margin:0;font-size:16px;letter-spacing:-.01em;line-height:1.3}
  .subcard .link{color:var(--accent-4);font-size:13.5px;word-break:break-all}
  .subcard .link:hover{text-decoration:underline}
  .subcard .meta{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);margin-top:4px}
  .score-pill{background:rgba(195,255,54,.1);color:#c9f76a;border:1px solid rgba(195,255,54,.25);padding:3px 10px;border-radius:999px;font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:600}
  .status-pill{font-size:10.5px;padding:2px 8px;border-radius:999px;letter-spacing:.05em;text-transform:uppercase;font-weight:600;font-family:"JetBrains Mono",monospace}
  .status-graded{background:rgba(56,189,248,.12);color:#7dd5ff}
  .status-submitted{background:rgba(139,92,246,.14);color:#c4b4ff}

  /* Gallery cards */
  .people-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
  .person{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px;transition:all .15s;display:flex;flex-direction:column;gap:8px;color:inherit}
  .person:hover{transform:translateY(-3px);border-color:rgba(195,255,54,.35)}
  .person .pname{font-family:"Instrument Serif",serif;font-style:italic;font-size:28px;line-height:1.1;letter-spacing:-.01em}
  .person .pmeta{color:var(--muted);font-size:13px}
  .person .pstat{margin-top:auto;padding-top:14px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);font-size:12px;color:var(--muted)}
  .person .pstat .n{color:var(--accent);font-family:"JetBrains Mono",monospace;font-weight:600}

  .empty{background:var(--card);border:1px dashed var(--line);border-radius:18px;padding:40px;text-align:center;color:var(--muted)}

  footer.site-ft{margin-top:80px;border-top:1px solid var(--line);padding:26px 0;color:var(--muted);font-size:13px;text-align:center}
  footer.site-ft a{color:var(--ink);border-bottom:1px solid var(--line)}
  .kudos-row{display:flex;gap:8px;align-items:center;margin-top:6px}
  .kudos-btn{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:999px;background:transparent;border:1px solid var(--line);color:var(--muted);font-size:12.5px;cursor:pointer;font-family:inherit;transition:all .15s}
  .kudos-btn:hover{border-color:rgba(195,255,54,.35);color:var(--ink)}
  .kudos-btn.on{background:rgba(195,255,54,.12);border-color:rgba(195,255,54,.5);color:#c9f76a}
  .kudos-btn .n{font-family:"JetBrains Mono",monospace;font-weight:600}
  .kudos-btn[disabled]{cursor:default;opacity:.75}
  @media(max-width:640px){
    .stats-row{grid-template-columns:1fr;gap:16px;padding:18px}
    .stat-big{font-size:48px}
    .dotgrid{grid-template-columns:repeat(10,1fr);max-width:100%}
    .gallery{grid-template-columns:1fr;gap:12px}
    .subcard{padding:16px}
    .people-grid{grid-template-columns:1fr;gap:12px}
    .person{padding:16px}
    .person .pname{font-size:22px}
    .self-banner{padding:14px 16px}
    .section-head{flex-wrap:wrap;gap:6px;margin:28px 0 14px}
  }
</style>
</head>
<body>

<nav>
  <div class="wrap nav-in">
    <div class="brand"><span class="dot"></span> Gnanalytica · Showcase</div>
    <div style="display:flex;gap:16px;align-items:center">
      <a href="index.html" style="font-size:13px;color:var(--muted)">Home</a>
      <a href="dashboard.html" style="font-size:13px;color:var(--muted)">Dashboard</a>
      <button class="theme-toggle" id="themeToggle" title="Toggle light/dark" aria-label="Toggle theme"></button>
    </div>
  </div>
</nav>

<main class="wrap page" id="root">
  <div class="loading" id="loader">Loading showcase…</div>
</main>

<footer class="site-ft">
  Powered by <a href="index.html">Gnanalytica AI workshop</a>
</footer>

<script type="module">
  import { supabase, COHORT_SLUG } from './assets/supabase.js';
  import { DAYS, WEEK_TITLES } from './assets/days.js';
  import { wireThemeToggle } from './assets/theme.js';
  wireThemeToggle();

  const root = document.getElementById('root');
  const params = new URLSearchParams(location.search);
  const uid = params.get('u');

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function formatDate(d) {
    if (!d) return '';
    try { return new Date(d).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }); }
    catch { return d; }
  }

  async function getCurrentCohort() {
    const { data } = await supabase.from('cohorts').select('*').eq('slug', COHORT_SLUG).maybeSingle();
    return data;
  }

  async function init() {
    if (uid) return renderIndividual(uid);
    return renderGallery();
  }

  async function renderGallery() {
    const cohort = await getCurrentCohort();
    if (!cohort) { root.innerHTML = '<div class="loading">Cohort not found.</div>'; return; }

    const { data: profiles } = await supabase
      .from('showcase_profiles')
      .select('*')
      .eq('cohort_id', cohort.id)
      .order('enrolled_at', { ascending: true });

    const people = profiles || [];
    const ids = people.map(p => p.user_id);

    let progMap = new Map();
    if (ids.length) {
      const { data: progs } = await supabase
        .from('showcase_progress')
        .select('*')
        .eq('cohort_id', cohort.id)
        .in('user_id', ids);
      (progs || []).forEach(p => progMap.set(p.user_id, p.days_completed));
    }

    root.innerHTML = `
      <header class="masthead">
        <div class="mast-kicker">Student showcase · ${escapeHtml(cohort.name || 'Cohort 01')}</div>
        <h1 class="mast-name">Meet the cohort.</h1>
        <p class="subhead">Public portfolios from students building through the 30-day AI workshop.</p>
      </header>

      ${people.length === 0 ? `
        <div class="empty">
          No public showcases yet. Students opt in from their own showcase page to appear here.
        </div>
      ` : `
        <div class="people-grid">
          ${people.map(p => `
            <a class="person" href="showcase.html?u=${encodeURIComponent(p.user_id)}">
              <div class="pname">${escapeHtml(p.full_name || 'Student')}</div>
              <div class="pmeta">${escapeHtml([p.college, p.year && `Year ${p.year}`].filter(Boolean).join(' · ') || '—')}</div>
              <div class="pstat">
                <span>${escapeHtml(p.cohort_name || 'Cohort')}</span>
                <span><span class="n">${progMap.get(p.user_id) || 0}</span>/30 days</span>
              </div>
            </a>
          `).join('')}
        </div>
      `}
    `;
  }

  async function renderIndividual(userId) {
    const [{ data: profile }, { data: { session } }] = await Promise.all([
      supabase.from('showcase_profiles').select('*').eq('user_id', userId).maybeSingle(),
      supabase.auth.getSession(),
    ]);

    if (!profile) return renderPrivate(session, userId);

    const [progressRes, subsRes] = await Promise.all([
      supabase.from('showcase_progress').select('*').eq('user_id', userId).eq('cohort_id', profile.cohort_id).maybeSingle(),
      supabase.from('showcase_submissions').select('*').eq('user_id', userId).eq('cohort_id', profile.cohort_id).order('day_number'),
    ]);

    // Find this user's team in this cohort, then see if capstone is showcased
    let showcasedCapstone = null;
    try {
      const { data: mem } = await supabase
        .from('team_members')
        .select('team_id, teams!inner(cohort_id)')
        .eq('user_id', userId)
        .eq('teams.cohort_id', profile.cohort_id)
        .maybeSingle();
      if (mem?.team_id) {
        const { data: cap } = await supabase.from('showcase_capstones').select('*').eq('team_id', mem.team_id).maybeSingle();
        if (cap) showcasedCapstone = cap;
      }
    } catch {}

    const daysCompleted = progressRes.data?.days_completed || 0;
    const submissions = subsRes.data || [];
    const isSelf = session?.user?.id === userId;
    const viewerId = session?.user?.id || null;

    // Kudos: load counts + viewer's own claps
    const subIds = submissions.map(s => s.id || s.submission_id).filter(Boolean);
    const kudosCount = new Map();
    const viewerKudos = new Set();
    if (subIds.length) {
      const { data: counts } = await supabase.from('kudos_counts').select('submission_id,count').in('submission_id', subIds);
      (counts || []).forEach(c => kudosCount.set(c.submission_id, c.count));
      if (viewerId) {
        const { data: mine } = await supabase.from('kudos').select('submission_id').eq('from_user', viewerId).in('submission_id', subIds);
        (mine || []).forEach(k => viewerKudos.add(k.submission_id));
      }
    }

    // derive week titles map and day titles
    const dayTitleMap = new Map(DAYS.map(d => [d.n, d]));

    // group submissions by week
    const byWeek = new Map();
    submissions.forEach(s => {
      const meta = dayTitleMap.get(s.day_number);
      const w = meta?.w || Math.ceil(s.day_number / 7);
      if (!byWeek.has(w)) byWeek.set(w, []);
      byWeek.get(w).push(s);
    });
    const weeks = [...byWeek.keys()].sort((a,b)=>a-b);

    // completion dots
    const dotsHtml = Array.from({length:30}, (_, i) => {
      // we don't know which specific days are done — days_completed is a count. Fill first N for visual.
      const on = i < daysCompleted;
      return `<div class="d ${on ? 'on' : ''}"></div>`;
    }).join('');

    const githubHtml = profile.github_username
      ? `<a href="https://github.com/${encodeURIComponent(profile.github_username)}" target="_blank" rel="noopener">github.com/${escapeHtml(profile.github_username)}</a>`
      : '';

    const metaBits = [
      profile.college,
      profile.year && `Year ${profile.year}`,
      githubHtml,
    ].filter(Boolean).join(' · ');

    root.innerHTML = `
      ${isSelf ? `
        <div class="self-banner" id="selfBanner">
          <div>
            <h3>This is your showcase</h3>
            <p>Toggle visibility — off keeps it private, on makes this page discoverable.</p>
          </div>
          <div class="toggle-wrap">
            <span id="toggleLbl">Public</span>
            <div class="toggle on" id="pubToggle" role="switch" aria-checked="true"></div>
          </div>
        </div>
      ` : ''}

      <header class="masthead">
        <div class="mast-kicker">${escapeHtml(profile.cohort_name || 'Cohort 01')}</div>
        <h1 class="mast-name">${escapeHtml(profile.full_name || 'Student')}</h1>
        <div class="mast-meta">${metaBits || '—'}</div>
        <p class="subhead">Completed the 30-day AI workshop at ${escapeHtml(profile.cohort_name || 'Cohort 01')}.</p>
        <div class="verify-pill"><span class="tick"></span>Verified cohort member of ${escapeHtml(profile.org_name || 'Gnanalytica')}</div>
      </header>

      <section class="stats-row">
        <div>
          <div class="stat-lbl">Days completed</div>
          <div class="stat-big">${daysCompleted}<small>/30</small></div>
        </div>
        <div>
          <div class="stat-lbl">Progress</div>
          <div class="dotgrid">${dotsHtml}</div>
        </div>
      </section>

      ${showcasedCapstone ? `
        <div class="section-head">
          <h2>Capstone</h2>
          <span class="muted" style="font-size:13px">Team project</span>
        </div>
        <div class="subcard" style="padding:20px 22px">
          <h4 style="margin:0 0 8px;font-size:18px">${escapeHtml(showcasedCapstone.title || '—')}</h4>
          ${showcasedCapstone.problem_statement ? `<p class="muted" style="font-size:13.5px;margin:0 0 12px;white-space:pre-wrap">${escapeHtml(showcasedCapstone.problem_statement)}</p>` : ''}
          <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px">
            ${showcasedCapstone.demo_url ? `<a class="link" href="${escapeHtml(showcasedCapstone.demo_url)}" target="_blank" rel="noopener">Demo →</a>` : ''}
            ${showcasedCapstone.video_url ? `<a class="link" href="${escapeHtml(showcasedCapstone.video_url)}" target="_blank" rel="noopener">Video →</a>` : ''}
            ${showcasedCapstone.github_url ? `<a class="link" href="${escapeHtml(showcasedCapstone.github_url)}" target="_blank" rel="noopener">GitHub →</a>` : ''}
            ${showcasedCapstone.pitch_deck_url ? `<a class="link" href="${escapeHtml(showcasedCapstone.pitch_deck_url)}" target="_blank" rel="noopener">Pitch deck →</a>` : ''}
          </div>
        </div>
      ` : ''}

      <div class="section-head">
        <h2>Work shipped</h2>
        <span class="muted" style="font-size:13px">${submissions.length} submission${submissions.length === 1 ? '' : 's'}</span>
      </div>

      ${submissions.length === 0 ? `
        <div class="empty">No public submissions yet.</div>
      ` : weeks.map(w => `
        <div class="week-kicker">Week ${String(w).padStart(2,'0')} — ${escapeHtml(WEEK_TITLES[w] || '')}</div>
        <div class="gallery">
          ${byWeek.get(w).map(s => {
            const meta = dayTitleMap.get(s.day_number);
            const title = s.assignment_title || meta?.title || `Day ${s.day_number}`;
            const statusCls = s.status === 'graded' ? 'status-graded' : 'status-submitted';
            const sid = s.id || s.submission_id;
            const kCount = kudosCount.get(sid) || 0;
            const kOn = viewerKudos.has(sid);
            let kudosHtml = '';
            if (sid && !isSelf) {
              if (viewerId) {
                kudosHtml = `<button class="kudos-btn ${kOn ? 'on' : ''}" data-sid="${escapeHtml(sid)}" data-to="${escapeHtml(userId)}" aria-pressed="${kOn}">👏 <span class="n">${kCount}</span></button>`;
              } else {
                kudosHtml = `<button class="kudos-btn" disabled title="Sign in to cheer">👏 <span class="n">${kCount}</span> · Sign in to cheer</button>`;
              }
            } else if (sid && isSelf) {
              kudosHtml = `<span class="kudos-btn" style="cursor:default">👏 <span class="n">${kCount}</span></span>`;
            }
            return `
              <div class="subcard">
                <div class="day-n">DAY ${String(s.day_number).padStart(2,'0')}</div>
                <h4>${escapeHtml(title)}</h4>
                ${s.content_url ? `<a class="link" href="${escapeHtml(s.content_url)}" target="_blank" rel="noopener">${escapeHtml(s.content_url)}</a>` : ''}
                <div class="meta">
                  <span>${formatDate(s.submitted_at)}</span>
                  <span style="display:flex;gap:6px;align-items:center">
                    ${s.score != null ? `<span class="score-pill">${escapeHtml(String(s.score))} pts</span>` : ''}
                    ${s.status ? `<span class="status-pill ${statusCls}">${escapeHtml(s.status)}</span>` : ''}
                  </span>
                </div>
                ${kudosHtml ? `<div class="kudos-row">${kudosHtml}</div>` : ''}
              </div>`;
          }).join('')}
        </div>
      `).join('')}
    `;

    // Update SEO/OG meta tags based on loaded profile
    try {
      const studentName = profile.full_name || 'Student';
      const college = profile.college || '';
      const year = profile.year || '';
      const capstoneTitle = showcasedCapstone?.title || '';
      document.title = `${studentName}'s AI Workshop Showcase — Gnanalytica`;
      const descParts = [studentName, college, year && `Year ${year}`, `Capstone: ${capstoneTitle || 'in progress'}`].filter(Boolean).join(' · ');
      const setMeta = (sel, val) => { const el = document.querySelector(sel); if (el) el.setAttribute('content', val); };
      setMeta('meta[name="description"]', descParts);
      setMeta('meta[property="og:title"]', document.title);
      setMeta('meta[property="og:description"]', descParts);
      setMeta('meta[name="twitter:title"]', document.title);
      setMeta('meta[name="twitter:description"]', descParts);
    } catch {}

    if (isSelf) wireSelfToggle(userId, profile.cohort_id);
    wireKudos(viewerId);
  }

  function wireKudos(viewerId) {
    document.querySelectorAll('.kudos-btn[data-sid]').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!viewerId || btn.disabled) return;
        const sid = btn.dataset.sid;
        const toUser = btn.dataset.to;
        const nEl = btn.querySelector('.n');
        const wasOn = btn.classList.contains('on');
        btn.disabled = true;
        let n = parseInt(nEl.textContent, 10) || 0;
        if (wasOn) {
          const { error } = await supabase.from('kudos').delete()
            .eq('from_user', viewerId).eq('submission_id', sid);
          if (!error) { btn.classList.remove('on'); nEl.textContent = Math.max(0, n - 1); }
          else alert(error.message);
        } else {
          const { error } = await supabase.from('kudos').insert({
            from_user: viewerId, to_user: toUser, submission_id: sid,
          });
          if (!error) { btn.classList.add('on'); nEl.textContent = n + 1; }
          else alert(error.message);
        }
        btn.disabled = false;
        btn.setAttribute('aria-pressed', btn.classList.contains('on'));
      });
    });
  }

  async function wireSelfToggle(userId, cohortId) {
    const toggle = document.getElementById('pubToggle');
    const lbl = document.getElementById('toggleLbl');
    if (!toggle) return;
    toggle.addEventListener('click', async () => {
      const turnOff = toggle.classList.contains('on');
      toggle.classList.toggle('on');
      lbl.textContent = turnOff ? 'Private' : 'Public';
      const { error } = await supabase.from('registrations')
        .update({ showcase_public: !turnOff })
        .eq('user_id', userId).eq('cohort_id', cohortId);
      if (error) {
        toggle.classList.toggle('on');
        lbl.textContent = turnOff ? 'Public' : 'Private';
        alert('Could not update: ' + error.message);
      } else if (turnOff) {
        setTimeout(() => location.reload(), 500);
      }
    });
  }

  async function renderPrivate(session, userId) {
    // If viewer is signed in AND matches the requested userId, offer opt-in
    const isSelf = session?.user?.id === userId;
    if (isSelf) {
      const cohort = await getCurrentCohort();
      const { data: reg } = cohort ? await supabase.from('registrations')
        .select('*').eq('user_id', userId).eq('cohort_id', cohort.id).maybeSingle() : { data: null };
      root.innerHTML = `
        <div class="empty" style="text-align:left;padding:32px">
          <div class="kicker">Your showcase is private</div>
          <h2 style="margin:6px 0 10px">Make it public?</h2>
          <p style="margin:0 0 18px">Your public showcase page will list your name, college, year, GitHub, day-count, and submission links (content_url only, no essay text).</p>
          ${reg ? `
            <button id="goPublic" class="cta">Go public →</button>
          ` : `
            <p>You need to be an enrolled student first. <a href="dashboard.html" style="color:var(--accent)">Enroll on the dashboard</a>.</p>
          `}
        </div>`;
      const btn = document.getElementById('goPublic');
      if (btn) btn.addEventListener('click', async () => {
        btn.disabled = true;
        btn.textContent = 'Updating…';
        const { error } = await supabase.from('registrations')
          .update({ showcase_public: true })
          .eq('user_id', userId).eq('cohort_id', cohort.id);
        if (error) { alert(error.message); btn.disabled = false; btn.textContent = 'Go public →'; return; }
        location.reload();
      });
      return;
    }
    root.innerHTML = `
      <div class="empty" style="padding:48px">
        <div class="kicker">Private</div>
        <h2 style="margin:8px 0 6px">This showcase is private</h2>
        <p>The student hasn't opted in to a public showcase yet.</p>
      </div>`;
  }

  init();
</script>
</body>
</html>
