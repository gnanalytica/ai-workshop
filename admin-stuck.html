<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Stuck queue · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script>document.documentElement.dataset.theme=localStorage.getItem('theme')||'dark';</script>
<link rel="stylesheet" href="assets/app.css" />
<style>
  .filters{display:flex;gap:10px;margin:18px 0 10px;flex-wrap:wrap;align-items:center}
  .filters select{background:var(--input-bg);border:1px solid var(--line);border-radius:10px;padding:10px 14px;color:var(--ink);font-family:inherit;font-size:13.5px;outline:none}
  .sq-tabs{display:flex;gap:6px;border-bottom:1px solid var(--line);margin:22px 0 16px;flex-wrap:wrap}
  .sq-tab{padding:10px 16px;font-size:13px;color:var(--muted);border:none;background:transparent;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;display:inline-flex;gap:8px;align-items:center}
  .sq-tab.active{color:var(--ink);border-bottom-color:var(--accent)}
  .sq-tab .n{font-family:"JetBrains Mono",monospace;font-size:11px;padding:1px 7px;border-radius:999px;background:rgba(255,255,255,.05);color:var(--muted)}
  .sq-tab.active .n{background:rgba(195,255,54,.12);color:var(--accent)}
  .sq-list{display:flex;flex-direction:column;gap:10px;margin-top:12px}
  .sq-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:14px;padding:14px 18px;background:var(--card);border:1px solid var(--line);border-left:3px solid var(--line);border-radius:0 12px 12px 0;align-items:start}
  .sq-row.st-pending{border-left-color:#7dd5ff}
  .sq-row.st-helping{border-left-color:#ffc87a}
  .sq-row.st-resolved{border-left-color:#c9f76a;opacity:.75}
  .sq-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
  .sq-who{font-weight:600;font-size:14px}
  .sq-day{font-family:"JetBrains Mono",monospace;font-size:11px;padding:2px 8px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--muted);letter-spacing:.08em}
  .sq-time{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted)}
  .sq-pill{padding:2px 9px;border-radius:999px;font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-family:"JetBrains Mono",monospace}
  .sq-pill.pending{background:rgba(56,189,248,.12);color:#7dd5ff;border:1px solid rgba(56,189,248,.25)}
  .sq-pill.helping{background:rgba(255,184,64,.12);color:#ffc87a;border:1px solid rgba(255,184,64,.3)}
  .sq-pill.resolved{background:rgba(195,255,54,.1);color:#c9f76a;border:1px solid rgba(195,255,54,.3)}
  .sq-msg{font-size:13.5px;color:#c9c9d3;line-height:1.5;margin-top:2px;white-space:pre-wrap;word-break:break-word}
  .sq-actions{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
  .btn-sm{padding:6px 12px;border-radius:8px;font-size:12px;background:transparent;border:1px solid var(--line);color:var(--ink);cursor:pointer;font-family:inherit;white-space:nowrap}
  .btn-sm:hover{border-color:var(--accent);color:var(--accent)}
  .btn-sm.primary{border-color:rgba(195,255,54,.4);color:#c9f76a}
  .btn-sm.primary:hover{background:rgba(195,255,54,.08)}
  .empty{padding:40px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:12px}
  @media(max-width:640px){
    .sq-tabs{flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none}
    .sq-tabs::-webkit-scrollbar{display:none}
    .sq-tab{white-space:nowrap;flex:0 0 auto;padding:10px 12px}
    .sq-row{grid-template-columns:1fr;gap:10px;padding:12px 14px}
    .sq-actions{flex-direction:row;align-items:stretch;flex-wrap:wrap;justify-content:flex-start}
    .sq-actions .btn-sm{flex:1;min-width:100px}
    .filters select{flex:1;min-width:0}
  }
</style>
</head>
<body>
<nav>
  <div class="wrap nav-in">
    <div class="brand"><span class="dot"></span> Gnanalytica · Admin</div>
    <div style="display:flex;gap:12px;align-items:center">
      <a href="index.html" class="muted" style="font-size:13px">← Home</a>
      <button class="theme-toggle" id="themeToggle" title="Toggle light/dark" aria-label="Toggle theme"></button>
      <button class="signout" id="signoutBtn" style="display:none;padding:8px 14px;border-radius:999px;background:transparent;border:1px solid var(--line);color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit">Sign out</button>
    </div>
  </div>
</nav>

<div class="gate" id="gate" style="display:none">
  <div class="gate-card">
    <div class="kicker">Admin login</div>
    <h2>Sign in</h2>
    <form id="loginForm">
      <div class="field"><label>Email</label><input type="email" name="email" required /></div>
      <button type="submit" class="submit-btn" id="loginBtn">Send magic link →</button>
      <div class="msg" id="loginMsg"></div>
    </form>
  </div>
</div>

<div class="gate" id="denied" style="display:none">
  <div class="gate-card"><h2 style="text-align:center">Not authorized</h2></div>
</div>

<main class="wrap" id="panel" style="display:none">
  <div id="adminNav"></div>
  <div style="margin:24px 0 8px">
    <div class="kicker">Live · realtime</div>
    <h1>🆘 Stuck queue</h1>
  </div>

  <div class="filters">
    <label class="muted" style="font-size:12px;text-transform:uppercase;letter-spacing:.12em">Cohort</label>
    <select id="cohortSel"></select>
  </div>

  <div class="sq-tabs" id="sqTabs">
    <button class="sq-tab active" data-tab="pending">Pending <span class="n" id="nPending">0</span></button>
    <button class="sq-tab" data-tab="helping">Helping <span class="n" id="nHelping">0</span></button>
    <button class="sq-tab" data-tab="resolved">Resolved <span class="n" id="nResolved">0</span></button>
  </div>

  <div class="sq-list" id="sqList"></div>
</main>

<script type="module">
  import { supabase, COHORT_SLUG } from './assets/supabase.js';
  import { renderAdminNav } from './assets/admin-nav.js';
  import { checkAdminOrFaculty, applyFacultyBrandLabel } from './assets/admin-auth.js';
  import { wireThemeToggle } from './assets/theme.js';
  import { DAYS } from './assets/days.js';
  wireThemeToggle();
  const $ = (id) => document.getElementById(id);
  let IS_ADMIN = false, IS_FACULTY = false, FACULTY_COHORT_IDS = [];

  let COHORTS = [], COHORT = null, ROWS = [], PROFILES = new Map(), TAB = 'pending', CHAN = null;
  const DAY_TITLES = new Map(DAYS.map(d => [d.n, d.title]));

  async function init() {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) return show('gate');
    await checkAdmin(session.user);
  }
  function show(id) { ['gate','denied','panel'].forEach(x => $(x).style.display = x===id?(id==='panel'?'block':'grid'):'none'); $('signoutBtn').style.display = id==='gate'?'none':'inline-block'; }

  $('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = $('loginBtn'); btn.disabled = true; btn.textContent = 'Sending…';
    const email = new FormData(e.target).get('email');
    const { error } = await supabase.auth.signInWithOtp({ email, options: { emailRedirectTo: window.location.href } });
    $('loginMsg').className = 'msg show ' + (error ? 'err' : 'ok');
    $('loginMsg').textContent = error ? error.message : 'Check your email.';
    btn.textContent = error ? 'Send magic link →' : 'Sent ✓';
    if (!error) btn.disabled = false;
  });
  $('signoutBtn').addEventListener('click', async () => { await supabase.auth.signOut(); location.reload(); });
  supabase.auth.onAuthStateChange((e, s) => { if (e === 'SIGNED_IN' && s) checkAdmin(s.user); if (e === 'SIGNED_OUT') show('gate'); });

  async function checkAdmin(user) {
    const r = await checkAdminOrFaculty(user);
    IS_ADMIN = r.isAdmin; IS_FACULTY = r.isFaculty; FACULTY_COHORT_IDS = r.facultyCohortIds;
    if (!IS_ADMIN && !IS_FACULTY) return show('denied');
    show('panel');
    document.getElementById('adminNav').innerHTML = renderAdminNav('admin-stuck.html', { role: IS_ADMIN ? 'admin' : 'faculty' });
    applyFacultyBrandLabel(IS_ADMIN, IS_FACULTY);
    let q = supabase.from('cohorts').select('*').order('starts_on', { ascending: false });
    if (!IS_ADMIN) q = q.in('id', FACULTY_COHORT_IDS);
    const { data: cs } = await q;
    COHORTS = cs || [];
    COHORT = COHORTS.find(c => c.slug === COHORT_SLUG) || COHORTS[0];
    $('cohortSel').innerHTML = COHORTS.map(c => `<option value="${c.id}" ${c.id===COHORT?.id?'selected':''}>${esc(c.name)}</option>`).join('');
    $('cohortSel').addEventListener('change', e => {
      COHORT = COHORTS.find(c => c.id === e.target.value);
      subscribe(); load();
    });
    subscribe();
    await load();
  }

  function subscribe() {
    if (CHAN) { supabase.removeChannel(CHAN); CHAN = null; }
    if (!COHORT) return;
    CHAN = supabase.channel('stuck-admin-' + COHORT.id)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'stuck_queue', filter: `cohort_id=eq.${COHORT.id}` }, () => load())
      .subscribe();
  }

  function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
  function rel(ts) { if (!ts) return ''; const d = (Date.now() - new Date(ts).getTime())/1000; if (d<60) return 'just now'; if (d<3600) return Math.floor(d/60)+'m ago'; if (d<86400) return Math.floor(d/3600)+'h ago'; return Math.floor(d/86400)+'d ago'; }

  async function load() {
    if (!COHORT) return;
    const { data, error } = await supabase.from('stuck_queue')
      .select('*').eq('cohort_id', COHORT.id).order('created_at', { ascending: true });
    if (error) { $('sqList').innerHTML = `<div class="empty">Could not load: ${esc(error.message)}</div>`; return; }
    ROWS = data || [];
    const ids = [...new Set(ROWS.map(r => r.user_id))];
    if (ids.length) {
      const { data: profs } = await supabase.from('profiles').select('id,full_name').in('id', ids);
      PROFILES = new Map((profs || []).map(p => [p.id, p]));
    }
    render();
  }

  function render() {
    const counts = { pending:0, helping:0, resolved:0 };
    ROWS.forEach(r => { if (counts[r.status] != null) counts[r.status]++; });
    $('nPending').textContent = counts.pending;
    $('nHelping').textContent = counts.helping;
    $('nResolved').textContent = counts.resolved;

    const list = ROWS.filter(r => r.status === TAB);
    if (TAB === 'resolved') list.reverse(); // newest first for resolved

    if (!list.length) {
      $('sqList').innerHTML = `<div class="empty">No ${TAB} items.</div>`;
      return;
    }

    $('sqList').innerHTML = list.map(r => {
      const p = PROFILES.get(r.user_id);
      const name = p?.full_name || '—';
      const dayTitle = r.day_number ? (DAY_TITLES.get(r.day_number) || '') : '';
      const dayTag = r.day_number ? `<span class="sq-day">DAY ${String(r.day_number).padStart(2,'0')}${dayTitle ? ' · ' + esc(dayTitle) : ''}</span>` : '';
      const actions = [];
      if (r.status === 'pending') {
        actions.push(`<button class="btn-sm primary" data-act="helping" data-id="${r.id}">Start helping</button>`);
        actions.push(`<button class="btn-sm" data-act="resolved" data-id="${r.id}">Resolve</button>`);
      } else if (r.status === 'helping') {
        actions.push(`<button class="btn-sm primary" data-act="resolved" data-id="${r.id}">Resolve</button>`);
        actions.push(`<button class="btn-sm" data-act="pending" data-id="${r.id}">Re-queue</button>`);
      } else {
        actions.push(`<button class="btn-sm" data-act="pending" data-id="${r.id}">Re-queue</button>`);
      }
      return `<div class="sq-row st-${r.status}">
        <div>
          <div class="sq-meta">
            <a href="admin-student.html?u=${esc(r.user_id)}" class="sq-who" style="color:inherit">${esc(name)}</a>
            ${dayTag}
            <span class="sq-pill ${r.status}">${r.status}</span>
            <span class="sq-time">${esc(rel(r.created_at))}${r.resolved_at ? ' · resolved ' + esc(rel(r.resolved_at)) : ''}</span>
          </div>
          ${r.message ? `<div class="sq-msg">${esc(r.message)}</div>` : `<div class="sq-msg muted" style="font-style:italic;color:var(--muted)">No message — just stuck.</div>`}
        </div>
        <div class="sq-actions">${actions.join('')}</div>
      </div>`;
    }).join('');
  }

  $('sqTabs').addEventListener('click', (e) => {
    const btn = e.target.closest('.sq-tab');
    if (!btn) return;
    TAB = btn.dataset.tab;
    document.querySelectorAll('.sq-tab').forEach(t => t.classList.toggle('active', t === btn));
    render();
  });

  $('sqList').addEventListener('click', async (e) => {
    const btn = e.target.closest('button[data-act]');
    if (!btn) return;
    const id = btn.dataset.id, act = btn.dataset.act;
    btn.disabled = true;
    const patch = { status: act };
    if (act === 'resolved') patch.resolved_at = new Date().toISOString();
    else if (act === 'pending') patch.resolved_at = null;
    const { error } = await supabase.from('stuck_queue').update(patch).eq('id', id);
    if (error) alert('Update failed: ' + error.message);
    btn.disabled = false;
    // realtime will reload
  });

  init();
</script>
</body>
</html>
