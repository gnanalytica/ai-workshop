<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Activity · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script>document.documentElement.dataset.theme=localStorage.getItem('theme')||'dark';</script>
<link rel="stylesheet" href="assets/app.css" />
<style>
  .feed{display:flex;flex-direction:column;gap:8px;margin-top:20px}
  .evt{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border-left:3px solid var(--line);background:var(--card);border-radius:0 12px 12px 0}
  .evt.t-reg{border-left-color:#7dd5ff}
  .evt.t-lab{border-left-color:var(--accent)}
  .evt.t-sub{border-left-color:#c9b8ff}
  .evt.t-quiz{border-left-color:#ffc87a}
  .evt-time{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);min-width:90px}
  .evt-body{flex:1}
  .evt-who{font-weight:600;color:var(--ink);font-size:14px}
  .evt-desc{font-size:13px;color:#c9c9d3;margin-top:2px}
  .evt-badge{padding:2px 8px;border-radius:6px;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
  .filt-row{display:flex;gap:10px;flex-wrap:wrap;margin:20px 0}
  .filt-row label{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted);cursor:pointer}
  .refresh-toggle{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted);margin-left:auto}
  .load-more{margin:20px auto;display:block;padding:10px 20px;background:transparent;border:1px solid var(--line);color:var(--ink);border-radius:10px;cursor:pointer;font-family:inherit}
  .load-more:hover{border-color:var(--accent)}
  @media(max-width:640px){
    .evt{flex-direction:column;gap:6px;padding:10px 12px}
    .evt-time{min-width:0}
    .filt-row{gap:8px}
    .refresh-toggle{margin-left:0;flex-basis:100%}
  }
</style>
</head>
<body>
<nav>
  <div class="wrap nav-in">
    <div class="brand"><span class="dot"></span> Gnanalytica · Admin</div>
    <div style="display:flex;gap:12px;align-items:center">
      <a href="index.html" class="muted" style="font-size:13px">← Home</a>
      <button class="theme-toggle" id="themeToggle" title="Toggle light/dark" aria-label="Toggle theme"></button>
      <button class="signout" id="signoutBtn" style="display:none;padding:8px 14px;border-radius:999px;background:transparent;border:1px solid var(--line);color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit">Sign out</button>
    </div>
  </div>
</nav>

<div class="gate" id="gate">
  <div class="gate-card">
    <div class="kicker">Admin login</div>
    <h2>Sign in</h2>
    <form id="loginForm">
      <div class="field"><label>Email</label><input type="email" name="email" required /></div>
      <button type="submit" class="submit-btn" id="loginBtn">Send magic link →</button>
      <div class="msg" id="loginMsg"></div>
    </form>
  </div>
</div>

<div class="gate" id="denied" style="display:none">
  <div class="gate-card"><h2 style="text-align:center">Not authorized</h2></div>
</div>

<main class="wrap" id="panel" style="display:none">
  <div id="adminNav"></div>
  <div style="margin:24px 0 8px">
    <div class="kicker">Live</div>
    <h1>Activity feed</h1>
  </div>
  <div class="filt-row" id="filters">
    <label><input type="checkbox" value="reg" checked /> Registrations</label>
    <label><input type="checkbox" value="lab" checked /> Lab completions</label>
    <label><input type="checkbox" value="sub" checked /> Submissions</label>
    <label><input type="checkbox" value="quiz" checked /> Quiz attempts</label>
    <label class="refresh-toggle"><input type="checkbox" id="autoRefresh" /> Auto-refresh every 30s</label>
  </div>
  <div id="feed" class="feed"></div>
  <button id="loadMore" class="load-more" style="display:none">Load more</button>
</main>

<script type="module">
  import { supabase, COHORT_SLUG } from './assets/supabase.js';
  import { renderAdminNav } from './assets/admin-nav.js';
  import { wireThemeToggle } from './assets/theme.js';
  wireThemeToggle();
  const $ = (id) => document.getElementById(id);
  document.getElementById('adminNav').innerHTML = renderAdminNav('admin-activity.html');

  let COHORT, LIMIT = 100, autoTimer;

  async function init() {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) return show('gate');
    await checkAdmin(session.user);
  }
  function show(id) { ['gate','denied','panel'].forEach(x => $(x).style.display = x===id?(id==='panel'?'block':'grid'):'none'); $('signoutBtn').style.display = id==='gate'?'none':'inline-block'; }

  $('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = $('loginBtn'); btn.disabled = true; btn.textContent = 'Sending…';
    const email = new FormData(e.target).get('email');
    const { error } = await supabase.auth.signInWithOtp({ email, options: { emailRedirectTo: window.location.href } });
    $('loginMsg').className = 'msg show ' + (error ? 'err' : 'ok');
    $('loginMsg').textContent = error ? error.message : 'Check your email.';
    btn.textContent = error ? 'Send magic link →' : 'Sent ✓';
    if (!error) btn.disabled = false;
  });
  $('signoutBtn').addEventListener('click', async () => { await supabase.auth.signOut(); location.reload(); });
  supabase.auth.onAuthStateChange((e, s) => { if (e === 'SIGNED_IN' && s) checkAdmin(s.user); if (e === 'SIGNED_OUT') show('gate'); });

  async function checkAdmin(user) {
    const { data: p } = await supabase.from('profiles').select('is_admin').eq('id', user.id).maybeSingle();
    if (!p?.is_admin) return show('denied');
    show('panel');
    const { data: c } = await supabase.from('cohorts').select('*').eq('slug', COHORT_SLUG).single();
    COHORT = c;
    await load();
  }

  function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
  function rel(ts) { const d = (Date.now() - new Date(ts).getTime())/1000; if (d<60) return 'just now'; if (d<3600) return Math.floor(d/60)+'m ago'; if (d<86400) return Math.floor(d/3600)+'h ago'; return Math.floor(d/86400)+'d ago'; }

  async function load() {
    const [regs, labs, subs, quizzes] = await Promise.all([
      supabase.from('registrations').select('id,user_id,status,created_at').eq('cohort_id', COHORT.id).order('created_at',{ascending:false}).limit(LIMIT),
      supabase.from('lab_progress').select('user_id,day_number,completed_at').eq('cohort_id', COHORT.id).order('completed_at',{ascending:false}).limit(LIMIT),
      supabase.from('submissions').select('user_id,assignment_id,submitted_at,status,assignments!inner(day_number,cohort_id)').eq('assignments.cohort_id', COHORT.id).order('submitted_at',{ascending:false}).limit(LIMIT),
      supabase.from('quiz_attempts').select('user_id,quiz_id,score,passed,completed_at,quizzes!inner(day_number,cohort_id)').eq('quizzes.cohort_id', COHORT.id).order('completed_at',{ascending:false}).limit(LIMIT),
    ]);

    const userIds = new Set();
    [...(regs.data||[]), ...(labs.data||[]), ...(subs.data||[]), ...(quizzes.data||[])].forEach(r => userIds.add(r.user_id));
    const { data: profiles } = await supabase.from('profiles').select('id,full_name').in('id', userIds.size ? [...userIds] : ['00000000-0000-0000-0000-000000000000']);
    const nameMap = new Map((profiles||[]).map(p => [p.id, p.full_name || '—']));

    const events = [];
    (regs.data||[]).forEach(r => events.push({ t: r.created_at, type: 'reg', user: r.user_id, desc: `registered (status: ${r.status})` }));
    (labs.data||[]).forEach(r => events.push({ t: r.completed_at, type: 'lab', user: r.user_id, desc: `marked Day ${r.day_number} complete` }));
    (subs.data||[]).forEach(r => events.push({ t: r.submitted_at, type: 'sub', user: r.user_id, desc: `submitted Day ${r.assignments.day_number} assignment (${r.status})` }));
    (quizzes.data||[]).forEach(r => events.push({ t: r.completed_at, type: 'quiz', user: r.user_id, desc: `scored ${r.score}% on Day ${r.quizzes.day_number} quiz ${r.passed ? '· passed' : ''}` }));
    events.sort((a,b) => new Date(b.t) - new Date(a.t));
    render(events, nameMap);
  }

  function render(events, nameMap) {
    const checked = [...document.querySelectorAll('#filters input[type=checkbox][value]')].filter(i => i.checked).map(i => i.value);
    const filtered = events.filter(e => checked.includes(e.type));
    $('feed').innerHTML = filtered.map(e => {
      const badge = { reg:'Registration', lab:'Lab', sub:'Submission', quiz:'Quiz' }[e.type];
      const name = nameMap.get(e.user) || '—';
      return `<div class="evt t-${e.type}">
        <div class="evt-time">${esc(rel(e.t))}</div>
        <div class="evt-body">
          <div class="evt-who"><a href="admin-student.html?u=${esc(e.user)}" style="color:inherit">${esc(name)}</a> <span class="tag tag-pend evt-badge">${esc(badge)}</span></div>
          <div class="evt-desc">${esc(e.desc)}</div>
        </div>
      </div>`;
    }).join('') || `<p class="muted" style="text-align:center;padding:40px">No events match.</p>`;
  }

  document.querySelectorAll('#filters input[type=checkbox][value]').forEach(cb => cb.addEventListener('change', load));
  $('autoRefresh').addEventListener('change', e => {
    clearInterval(autoTimer);
    if (e.target.checked) autoTimer = setInterval(load, 30000);
  });

  init();
</script>
</body>
</html>
