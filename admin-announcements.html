<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Announcements · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script>document.documentElement.dataset.theme=localStorage.getItem('theme')||'dark';</script>
<link rel="stylesheet" href="assets/app.css" />
<style>
  .ann-form{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;margin:20px 0}
  .ann-form .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .ann-list{display:flex;flex-direction:column;gap:10px;margin-top:20px}
  .ann-card{padding:14px 16px;background:var(--card);border:1px solid var(--line);border-left:4px solid var(--line);border-radius:12px}
  .ann-card.s-info{border-left-color:#38bdf8}
  .ann-card.s-success{border-left-color:#c3ff36}
  .ann-card.s-warning{border-left-color:#ffc87a}
  .ann-card.s-urgent{border-left-color:#ff6b6b}
  .ann-head{display:flex;justify-content:space-between;gap:10px;align-items:baseline;flex-wrap:wrap;margin-bottom:6px}
  .ann-title{font-weight:600;font-size:15px;margin:0}
  .ann-meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.1em}
  .ann-body{font-size:13.5px;color:#c9c9d3;white-space:pre-wrap;line-height:1.55}
  .ann-acts{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
  .ann-acts button{padding:6px 12px;border-radius:8px;background:transparent;border:1px solid var(--line);color:var(--ink);font-size:12px;cursor:pointer;font-family:inherit}
  .ann-acts button:hover{border-color:var(--accent)}
  .ann-acts button.danger:hover{border-color:#ff6b6b;color:#ffa0a0}
  .pin-tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10.5px;background:rgba(195,255,54,.12);color:#c9f76a;border:1px solid rgba(195,255,54,.3);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-left:6px}
  @media(max-width:640px){.ann-form .row{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav>
  <div class="wrap nav-in">
    <div class="brand"><span class="dot"></span> Gnanalytica · Admin</div>
    <div style="display:flex;gap:12px;align-items:center">
      <a href="index.html" class="muted" style="font-size:13px">← Home</a>
      <button class="theme-toggle" id="themeToggle" title="Toggle light/dark" aria-label="Toggle theme"></button>
      <button class="signout" id="signoutBtn" style="display:none;padding:8px 14px;border-radius:999px;background:transparent;border:1px solid var(--line);color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit">Sign out</button>
    </div>
  </div>
</nav>

<div class="gate" id="gate" style="display:none">
  <div class="gate-card">
    <div class="kicker">Admin login</div>
    <h2>Sign in</h2>
    <form id="loginForm">
      <div class="field"><label>Email</label><input type="email" name="email" required /></div>
      <button type="submit" class="submit-btn" id="loginBtn">Send magic link →</button>
      <div class="msg" id="loginMsg"></div>
    </form>
  </div>
</div>

<div class="gate" id="denied" style="display:none">
  <div class="gate-card"><h2 style="text-align:center">Not authorized</h2></div>
</div>

<main class="wrap" id="panel" style="display:none">
  <div id="adminNav"></div>
  <div style="margin:24px 0 8px">
    <div class="kicker">Broadcast</div>
    <h1>Announcements</h1>
    <p class="muted" style="font-size:14px;margin:4px 0 0">Post to your cohort. Pinned messages stay at the top of students' dashboards.</p>
  </div>

  <form class="ann-form" id="annForm">
    <div class="field"><label>Title</label><input type="text" name="title" required maxlength="200" /></div>
    <div class="field"><label>Body <span class="muted" style="text-transform:none;letter-spacing:0">(markdown OK)</span></label><textarea name="body" rows="4" required></textarea></div>
    <div class="row">
      <div class="field"><label>Severity</label>
        <select name="severity">
          <option value="info">info</option>
          <option value="success">success</option>
          <option value="warning">warning</option>
          <option value="urgent">urgent</option>
        </select>
      </div>
      <div class="field"><label>Pinned until <span class="muted" style="text-transform:none;letter-spacing:0">(optional)</span></label><input type="datetime-local" name="pinned_until" /></div>
    </div>
    <button type="submit" class="submit-btn" id="postBtn">Post announcement →</button>
    <div class="msg" id="postMsg"></div>
  </form>

  <div class="ann-list" id="annList"></div>
</main>

<script type="module">
  import { supabase, COHORT_SLUG } from './assets/supabase.js';
  import { renderAdminNav } from './assets/admin-nav.js';
  import { checkAdminOrFaculty, applyFacultyBrandLabel } from './assets/admin-auth.js';
  import { wireThemeToggle } from './assets/theme.js';
  wireThemeToggle();

  const $ = (id) => document.getElementById(id);
  let IS_ADMIN = false, IS_FACULTY = false, FACULTY_COHORT_IDS = [];
  let COHORT, CURRENT_USER, SUB;

  function esc(s){ return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }

  function show(id){ ['gate','denied','panel'].forEach(x => $(x).style.display = x===id ? (id==='panel' ? 'block' : 'grid') : 'none'); $('signoutBtn').style.display = id==='gate' ? 'none' : 'inline-block'; }

  $('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = $('loginBtn'); btn.disabled = true; btn.textContent = 'Sending…';
    const email = new FormData(e.target).get('email');
    const { error } = await supabase.auth.signInWithOtp({ email, options: { emailRedirectTo: window.location.href } });
    $('loginMsg').className = 'msg show ' + (error ? 'err' : 'ok');
    $('loginMsg').textContent = error ? error.message : 'Check your email.';
    btn.textContent = error ? 'Send magic link →' : 'Sent ✓';
    if (!error) btn.disabled = false;
  });
  $('signoutBtn').addEventListener('click', async () => { await supabase.auth.signOut(); location.reload(); });
  supabase.auth.onAuthStateChange((e, s) => { if (e === 'SIGNED_IN' && s) init(); if (e === 'SIGNED_OUT') show('gate'); });

  async function init() {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) return show('gate');
    CURRENT_USER = session.user;
    const r = await checkAdminOrFaculty(session.user);
    IS_ADMIN = r.isAdmin; IS_FACULTY = r.isFaculty; FACULTY_COHORT_IDS = r.facultyCohortIds;
    if (!IS_ADMIN && !IS_FACULTY) return show('denied');
    show('panel');
    $('adminNav').innerHTML = renderAdminNav('admin-announcements.html', { role: IS_ADMIN ? 'admin' : 'faculty' });
    applyFacultyBrandLabel(IS_ADMIN, IS_FACULTY);

    let cq = supabase.from('cohorts').select('*').eq('slug', COHORT_SLUG);
    if (!IS_ADMIN) cq = cq.in('id', FACULTY_COHORT_IDS);
    let { data: c } = await cq.maybeSingle();
    if (!c && !IS_ADMIN && FACULTY_COHORT_IDS.length) {
      const { data: fc } = await supabase.from('cohorts').select('*').in('id', FACULTY_COHORT_IDS).order('starts_on', { ascending: false }).limit(1).maybeSingle();
      c = fc;
    }
    if (!c) { $('annList').innerHTML = `<div class="muted" style="padding:40px;text-align:center">You're not assigned to any cohort yet — ask an admin.</div>`; return; }
    COHORT = c;
    await load();
    subscribe();
  }

  async function load() {
    const { data, error } = await supabase
      .from('announcements')
      .select('*')
      .eq('cohort_id', COHORT.id)
      .order('created_at', { ascending: false });
    if (error) { $('annList').innerHTML = `<div class="muted">${esc(error.message)}</div>`; return; }
    render(data || []);
  }

  function render(rows) {
    if (!rows.length) { $('annList').innerHTML = `<div class="muted" style="padding:30px;text-align:center">No announcements yet.</div>`; return; }
    const now = Date.now();
    $('annList').innerHTML = rows.map(a => {
      const pinned = a.pinned_until && new Date(a.pinned_until).getTime() > now;
      return `<div class="ann-card s-${esc(a.severity || 'info')}" data-id="${esc(a.id)}">
        <div class="ann-head">
          <h3 class="ann-title">${esc(a.title)}${pinned ? `<span class="pin-tag">Pinned</span>` : ''}</h3>
          <span class="ann-meta">${esc(a.severity || 'info')} · ${esc(new Date(a.created_at).toLocaleString())}</span>
        </div>
        <div class="ann-body">${esc(a.body)}</div>
        <div class="ann-acts">
          <button data-act="pin">Pin 24h</button>
          <button data-act="unpin">Unpin</button>
          <button data-act="edit">Edit</button>
          <button data-act="delete" class="danger">Delete</button>
        </div>
      </div>`;
    }).join('');
    $('annList').querySelectorAll('.ann-card').forEach(card => {
      const id = card.dataset.id;
      card.querySelectorAll('button[data-act]').forEach(btn => btn.addEventListener('click', () => act(id, btn.dataset.act, rows.find(r => r.id === id))));
    });
  }

  async function act(id, a, row) {
    if (a === 'delete') {
      if (!confirm('Delete this announcement?')) return;
      const { error } = await supabase.from('announcements').delete().eq('id', id);
      if (error) alert(error.message); else load();
    } else if (a === 'pin') {
      const until = new Date(Date.now() + 24*3600*1000).toISOString();
      const { error } = await supabase.from('announcements').update({ pinned_until: until }).eq('id', id);
      if (error) alert(error.message); else load();
    } else if (a === 'unpin') {
      const { error } = await supabase.from('announcements').update({ pinned_until: null }).eq('id', id);
      if (error) alert(error.message); else load();
    } else if (a === 'edit') {
      const title = prompt('Title', row.title);
      if (title == null) return;
      const body = prompt('Body', row.body);
      if (body == null) return;
      const { error } = await supabase.from('announcements').update({ title, body }).eq('id', id);
      if (error) alert(error.message); else load();
    }
  }

  $('annForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = $('postBtn'); const msg = $('postMsg');
    btn.disabled = true; btn.textContent = 'Posting…'; msg.className = 'msg';
    const fd = new FormData(e.target);
    const pinnedVal = fd.get('pinned_until');
    const payload = {
      cohort_id: COHORT.id,
      title: String(fd.get('title') || '').trim(),
      body: String(fd.get('body') || '').trim(),
      severity: String(fd.get('severity') || 'info'),
      pinned_until: pinnedVal ? new Date(pinnedVal).toISOString() : null,
      posted_by: CURRENT_USER.id,
    };
    const { error } = await supabase.from('announcements').insert(payload);
    btn.disabled = false; btn.textContent = 'Post announcement →';
    if (error) { msg.className = 'msg show err'; msg.textContent = error.message; return; }
    msg.className = 'msg show ok'; msg.textContent = 'Posted.';
    e.target.reset();
    load();
  });

  function subscribe() {
    if (SUB) { try { supabase.removeChannel(SUB); } catch {} }
    SUB = supabase.channel(`ann-admin-${COHORT.id}`)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'announcements', filter: `cohort_id=eq.${COHORT.id}` }, () => load())
      .subscribe();
  }

  init();
</script>
</body>
</html>
